<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Toni</title>
  <style>
    /* ── Design System Tokens ── */
    :root {
      /* Brand Primary */
      --primary-900: #0B0F31;
      --primary-800: #141A5C;
      --primary-700: #1E2678;
      --primary-600: #2833AC;
      --primary-500: #3949F5;
      --primary-400: #5B6BF7;
      --primary-300: #8691FA;
      --primary-200: #B0B7FC;
      --primary-100: #D5D9FD;
      --primary-50: #EAECFE;
      --primary-25: #F4F5FF;
      --primary-10: #F9F9FF;

      /* Surfaces */
      --surface-background: #F4F5FF;
      --surface-container: #FFFFFF;
      --surface-container-low: #FAFAFF;
      --surface-container-high: #EAECFE;

      /* Semantic */
      --text-primary: #0B0F31;
      --text-secondary: #5A5E7A;
      --text-tertiary: #8E91A8;
      --text-on-primary: #FFFFFF;
      --error: #E8345A;
      --error-hover: #C02040;

      /* Button */
      --btn-primary: #3949F5;
      --btn-primary-hover: #2833AC;
      --btn-primary-pressed: #1E2678;
      --btn-secondary-pressed: #EBECFC;
      --btn-disabled: #C8CAD8;

      /* Border */
      --border-neutral-light: #F1F2F5;
      --border-brand: #D7DBFD;

      /* Elevation */
      --elevation-standard: #F1F2F5;

      /* Corner Radius */
      --cr-5: 5px;
      --cr-10: 10px;
      --cr-20: 20px;
      --cr-30: 30px;
      --cr-40: 40px;
      --cr-80: 80px;
      --cr-round: 999px;

      /* Typography */
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      /* Font Sizes */
      --label-small: 11px;
      --label-medium: 12px;
      --label-large: 14px;
      --body-small: 13px;
      --body-medium: 14px;
      --body-large: 16px;
      --title-small: 16px;
      --title-medium: 20px;
      --title-large: 24px;

      /* Spacing */
      --space-xs: 4px;
      --space-s: 8px;
      --space-m: 12px;
      --space-l: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: var(--surface-background);
      font-family: var(--font-family);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Chat Container ── */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: var(--surface-container);
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: var(--space-m);
      padding: var(--space-l) var(--space-xl);
      border-bottom: 1px solid var(--border-neutral-light);
      background: var(--surface-container);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .header-avatar svg {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-name {
      font-size: var(--title-small);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .header-subtitle {
      font-size: var(--label-medium);
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: var(--space-s);
    }
    .header-icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--cr-round);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      transition: background 0.15s;
    }
    .header-icon-btn:hover {
      background: var(--primary-50);
    }
    .header-icon-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ── Messages Area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-l);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--primary-200); border-radius: 2px; }

    /* ── Message Bubbles ── */
    .msg-row {
      display: flex;
      gap: var(--space-s);
      max-width: 85%;
    }
    .msg-row.toni { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-bubble {
      padding: var(--space-m) var(--space-l);
      font-size: var(--body-medium);
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg-row.toni .msg-bubble {
      background: var(--surface-container-high);
      border-radius: var(--cr-20) var(--cr-20) var(--cr-20) var(--cr-5);
      color: var(--text-primary);
    }
    .msg-row.user .msg-bubble {
      background: var(--primary-50);
      border-radius: var(--cr-20) var(--cr-20) var(--cr-5) var(--cr-20);
      color: var(--text-primary);
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: var(--space-s);
      margin-top: var(--space-xs);
    }
    .msg-time {
      font-size: var(--label-small);
      color: var(--text-tertiary);
    }

    /* ── Play Audio Button (from design system) ── */
    .play-audio-btn {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border-neutral-light);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      box-shadow: 0 2px 0 0 var(--elevation-standard);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .play-audio-btn:hover {
      border-color: var(--border-brand);
      background: var(--primary-50);
    }
    .play-audio-btn:active {
      background: var(--btn-secondary-pressed);
      border-color: var(--border-brand);
      box-shadow: none;
    }
    .play-audio-btn.playing {
      border-color: var(--border-brand);
      background: var(--surface-container);
    }
    .play-audio-btn.playing .progress-ring {
      display: block;
    }
    .play-audio-btn svg.icon {
      width: 16px;
      height: 16px;
      fill: var(--primary-500);
    }
    .play-audio-btn .progress-ring {
      display: none;
      position: absolute;
      inset: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
    }
    .play-audio-btn .progress-ring circle {
      fill: none;
      stroke: var(--primary-500);
      stroke-width: 2;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 0.1s linear;
    }

    /* ── Quick Reply Chips ── */
    .quick-replies {
      padding: 0 var(--space-xl) var(--space-l);
      flex-shrink: 0;
    }
    .quick-replies-label {
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      color: var(--text-tertiary);
      margin-bottom: var(--space-s);
    }
    .chips-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-s);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid var(--primary-200);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .chip:hover {
      background: var(--primary-50);
      border-color: var(--primary-400);
      color: var(--btn-primary);
    }
    .chip:active {
      background: var(--btn-secondary-pressed);
    }
    .chip-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ── Close Chat Button ── */
    .close-chat-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-m);
      padding: var(--space-xl) 0;
      align-self: center;
    }
    .close-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-s);
      padding: 12px var(--space-xxl);
      border: none;
      border-radius: var(--cr-30);
      background: var(--btn-primary);
      color: var(--text-on-primary);
      font-family: var(--font-family);
      font-size: var(--body-medium);
      font-weight: var(--weight-semibold);
      cursor: pointer;
      transition: all 0.15s;
    }
    .close-chat-btn:hover { background: var(--btn-primary-hover); }
    .close-chat-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ── Follow-up Chips (in chat) ── */
    .follow-up-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-s);
      padding: var(--space-xs) 0;
      align-self: flex-start;
    }
    .chip.follow-up {
      background: var(--surface-container);
      border-color: var(--primary-300);
      color: var(--primary-500);
      font-weight: var(--weight-medium);
    }
    .chip.follow-up:hover {
      background: var(--primary-50);
      border-color: var(--primary-500);
      color: var(--primary-700);
    }

    /* ── Input Bar ── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: var(--space-s);
      padding: var(--space-m) var(--space-xl) var(--space-xl);
      border-top: 1px solid var(--border-neutral-light);
      background: var(--surface-container);
      flex-shrink: 0;
    }
    .input-field {
      flex: 1;
      padding: 10px var(--space-l);
      border: 1.5px solid var(--primary-200);
      border-radius: var(--cr-30);
      font-family: var(--font-family);
      font-size: var(--body-medium);
      color: var(--text-primary);
      background: var(--surface-container-low);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-field::placeholder { color: var(--text-tertiary); }
    .input-field:focus {
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(57, 73, 245, 0.1);
    }

    /* Mic button (voice mode toggle) */
    .mic-btn {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--primary-200);
      border-radius: 50%;
      background: var(--surface-container);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .mic-btn svg { width: 20px; height: 20px; fill: var(--primary-500); }
    .mic-btn:hover {
      background: var(--primary-50);
      border-color: var(--primary-400);
    }
    .mic-btn.recording {
      background: var(--error);
      border-color: var(--error);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .mic-btn.recording svg { fill: white; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232, 52, 90, 0.35); }
      50% { box-shadow: 0 0 0 10px rgba(232, 52, 90, 0); }
    }

    /* Send button */
    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--btn-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .send-btn svg { width: 20px; height: 20px; fill: white; }
    .send-btn:hover:not(:disabled) { background: var(--btn-primary-hover); }
    .send-btn:disabled {
      background: var(--btn-disabled);
      cursor: default;
      opacity: 0.5;
    }

    /* ── Loading dots ── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: var(--space-m) var(--space-l);
      align-items: center;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary-300);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Debug Panel (expression showcase) ── */
    .debug-panel {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-container);
      border-top: 1px solid var(--primary-100);
      padding: var(--space-l);
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .debug-panel.open { display: block; }
    .debug-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-m);
    }
    .debug-panel-title {
      font-size: var(--label-large);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .debug-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 20px;
      line-height: 1;
    }
    .debug-stage {
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-m);
    }
    .debug-stage svg {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }
    .expression-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .expression-chips button {
      padding: 6px 14px;
      border: 1.5px solid var(--primary-200);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all 0.15s;
    }
    .expression-chips button:hover {
      background: var(--primary-50);
      border-color: var(--primary-400);
      color: var(--btn-primary);
    }
    .expression-chips button.active {
      background: var(--btn-primary);
      color: var(--text-on-primary);
      border-color: var(--btn-primary);
    }

    /* Ensure safe area on iOS */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .input-bar {
        padding-bottom: calc(var(--space-xl) + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

    <div class="quick-replies" id="quick-replies">

    <!-- Input Bar -->

          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>

  <script>
    // =============================================
    // ELEMENT REFS
    // =============================================
    const leftEyeWhite = document.getElementById('left-eye-white');
    const rightEyeWhite = document.getElementById('right-eye-white');
    const leftEye = document.getElementById('left-eye');
    const rightEye = document.getElementById('right-eye');
    const leftBrow = document.getElementById('left-brow');
    const rightBrow = document.getElementById('right-brow');
    const mouthGroup = document.getElementById('mouth-group');
    const messagesArea = document.getElementById('messages-area');
    const inputField = document.getElementById('input-field');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const quickReplies = document.getElementById('quick-replies');

    // =============================================
    // APP CONTEXT (received from native WebView host)
    // =============================================
    window.appContext = window.appContext || {};

    window.setAppContext = function(ctx) {
      window.appContext = ctx;
      console.log('App context received:', ctx);
      if (ctx.language && ctx.language !== 'en') {
        window.appContext._lang = ctx.language;
      }
      if (ctx.entrypoint) {
        console.log('Entrypoint:', ctx.entrypoint);
      }
      if (window.webkit?.messageHandlers?.toni) {
        window.webkit.messageHandlers.toni.postMessage({ type: 'ready' });
      }
    };

    // =============================================
    // STATE
    // =============================================
    let currentExpression = 'happy';
    let blinkTimeout = null;
    let isBusy = false;
    let inputMode = 'text'; // 'text' or 'voice'

    // Voice conversation state
    let ws = null;
    let isConversationActive = false;
    let hasUserSpoken = false; // suppress agent greeting audio until user speaks
    let micStream = null;
    let micProcessor = null;
    let audioContext = null;
    let animFrameId = null;
    let pcmBuffer = [];
    let isPlayingAudio = false;
    let playbackGain = null;
    let playbackAnalyser = null;
    let agentAudioFormat = 'pcm_16000';

    // Track currently playing message audio
    let currentPlayingBtn = null;
    let currentPlayingSource = null;

    const MX = 1161, MY = 1490;
    const DEFAULT = {
      leftWhite: { cx: 915, cy: 1116, rx: 180, ry: 259 },
      rightWhite: { cx: 1413, cy: 1116, rx: 180, ry: 259 },
    };

    // =============================================
    // VISEME MOUTH SHAPES
    // =============================================
    const visemes = {
      rest: () => `<path d="M${MX-200} ${MY} Q${MX} ${MY+90} ${MX+200} ${MY}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`,
      BMP: () => `<path d="M${MX-170} ${MY} L${MX+170} ${MY}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round" fill="none"/>`,
      AEI: () => {
        const w = 180, h = 110;
        return `<ellipse cx="${MX}" cy="${MY+10}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+10}" width="${w*2}" height="40" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-40}" width="${w*2-30}" height="35" rx="6" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY+h-25}" rx="70" ry="42" fill="#E8345A"/>`;
      },
      Ee: () => {
        const w = 185, h = 60;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h}" width="${w*2}" height="35" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-32}" width="${w*2-30}" height="28" rx="6" fill="white" opacity="0.95"/>`;
      },
      UQW: () => `<ellipse cx="${MX}" cy="${MY+5}" rx="60" ry="72" fill="#0B0F31"/>`,
      O: () => `<ellipse cx="${MX}" cy="${MY+5}" rx="85" ry="95" fill="#0B0F31"/>`,
      CDNSTZ: () => {
        const w = 155, h = 38;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w+10}" y="${MY-8}" width="${(w-10)*2}" height="16" rx="4" fill="white" opacity="0.95"/>`;
      },
      GK: () => {
        const w = 160, h = 55;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h}" width="${w*2}" height="30" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-28}" width="${w*2-30}" height="24" rx="6" fill="white" opacity="0.95"/>`;
      },
      Th: () => {
        const w = 140, h = 35;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w+5}" y="${MY-h}" width="${(w-5)*2}" height="25" rx="5" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY+h-8}" rx="50" ry="22" fill="#E8345A"/>`;
      },
      FV: () => {
        const w = 155, h = 30;
        return `<path d="M${MX-w} ${MY-5} Q${MX} ${MY-h-10} ${MX+w} ${MY-5}" stroke="#0B0F31" stroke-width="6" fill="none"/>
          <ellipse cx="${MX}" cy="${MY+5}" rx="${w-10}" ry="${h-5}" fill="#0B0F31"/>
          <rect x="${MX-w+10}" y="${MY-h+15}" width="${(w-10)*2}" height="22" rx="4" fill="white" opacity="0.95"/>`;
      },
      L: () => {
        const w = 165, h = 80;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="32" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-28}" width="${w*2-30}" height="24" rx="6" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY-h+40}" rx="45" ry="28" fill="#E8345A"/>`;
      },
      R: () => {
        const w = 120, h = 65;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="28" rx="5" fill="white" opacity="0.95"/>`;
      },
      H: () => {
        const w = 160, h = 90;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="30" rx="6" fill="white" opacity="0.95"/>`;
      },
    };

    const volumeMouths = [
      () => visemes.rest(),
      () => visemes.BMP(),
      () => visemes.CDNSTZ(),
      () => visemes.Ee(),
      () => visemes.AEI(),
    ];

    function setViseme(name) {
      const fn = visemes[name];
      if (fn) mouthGroup.innerHTML = fn();
    }

    // =============================================
    // MESSAGE RENDERING
    // =============================================
    function getTimeString() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, role, audioBase64) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);

      messagesArea.appendChild(row);

      // Add meta row (time + optional play button) for toni messages
      if (role === 'toni') {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';

        if (audioBase64) {
          const playBtn = document.createElement('button');
          playBtn.className = 'play-audio-btn';
          playBtn.innerHTML = `
            <svg class="progress-ring" viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" stroke-dasharray="94.25" stroke-dashoffset="0"/></svg>
            <svg class="icon icon-volume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg class="icon icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg class="icon icon-play" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>`;
          playBtn._audioBase64 = audioBase64;
          playBtn.onclick = () => togglePlayAudio(playBtn);
          meta.appendChild(playBtn);
        }

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = getTimeString();
        meta.appendChild(time);

        row.appendChild(meta);
      } else {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.style.justifyContent = 'flex-end';
        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = getTimeString();
        meta.appendChild(time);
        row.appendChild(meta);
      }

      messagesArea.scrollTop = messagesArea.scrollHeight;
      return row;
    }

    function showTypingIndicator() {
      const row = document.createElement('div');
      row.className = 'msg-row toni';
      row.id = 'typing-indicator';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      row.appendChild(bubble);
      messagesArea.appendChild(row);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // =============================================
    // PLAY AUDIO (per-message)
    // =============================================
    async function togglePlayAudio(btn) {
      // If already playing this one, stop it
      if (currentPlayingBtn === btn) {
        stopCurrentAudio();
        return;
      }
      // Stop any other playing audio
      if (currentPlayingBtn) stopCurrentAudio();

      if (!audioContext) audioContext = new AudioContext();

      const raw = atob(btn._audioBase64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      const audioBuffer = await audioContext.decodeAudioData(bytes.buffer.slice(0));

      if (!playbackAnalyser) {
        playbackAnalyser = audioContext.createAnalyser();
        playbackAnalyser.fftSize = 256;
        playbackAnalyser.smoothingTimeConstant = 0.3;
      }
      if (!playbackGain) {
        playbackGain = audioContext.createGain();
        playbackGain.gain.value = 1.0;
        playbackGain.connect(playbackAnalyser);
        playbackAnalyser.connect(audioContext.destination);
      }

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(playbackGain);

      currentPlayingBtn = btn;
      currentPlayingSource = source;
      isPlayingAudio = true;

      // Update button state
      btn.classList.add('playing');
      btn.querySelector('.icon-volume').style.display = 'none';
      btn.querySelector('.icon-pause').style.display = 'block';
      btn.querySelector('.icon-play').style.display = 'none';

      // Start mouth sync
      if (!animFrameId) startMouthSync();

      // Animate progress ring
      const duration = audioBuffer.duration;
      const circle = btn.querySelector('.progress-ring circle');
      const circumference = 94.25;
      const startTime = audioContext.currentTime;
      function updateProgress() {
        if (currentPlayingBtn !== btn) return;
        const elapsed = audioContext.currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        circle.style.strokeDashoffset = circumference * (1 - progress);
        if (progress < 1) requestAnimationFrame(updateProgress);
      }
      updateProgress();

      source.onended = () => {
        if (currentPlayingBtn === btn) {
          stopCurrentAudio();
          // Show replay state
          btn.querySelector('.icon-volume').style.display = 'none';
          btn.querySelector('.icon-pause').style.display = 'none';
          btn.querySelector('.icon-play').style.display = 'block';
        }
      };
      source.start();
    }

    function stopCurrentAudio() {
      if (currentPlayingSource) {
        try { currentPlayingSource.stop(); } catch(e) {}
        currentPlayingSource = null;
      }
      if (currentPlayingBtn) {
        currentPlayingBtn.classList.remove('playing');
        currentPlayingBtn.querySelector('.icon-volume').style.display = 'block';
        currentPlayingBtn.querySelector('.icon-pause').style.display = 'none';
        currentPlayingBtn.querySelector('.icon-play').style.display = 'none';
        const circle = currentPlayingBtn.querySelector('.progress-ring circle');
        circle.style.strokeDashoffset = '0';
        currentPlayingBtn = null;
      }
      isPlayingAudio = false;
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      setViseme('rest');
    }

    // =============================================
    // DYNAMIC FOLLOW-UP CHIPS
    // =============================================
    function removeFollowUpChips() {
      const existing = document.getElementById('follow-up-chips');
      if (existing) existing.remove();
    }

    function showFollowUpChips(chips) {
      removeFollowUpChips();

      // No follow-ups = conversation ended → show close button
      if (!chips || chips.length === 0) {
        showCloseChat();
        return;
      }

      const container = document.createElement('div');
      container.id = 'follow-up-chips';
      container.className = 'follow-up-chips';

      chips.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'chip follow-up';
        btn.textContent = text;
        btn.onclick = () => {
          removeFollowUpChips();
          doSend(text);
        };
        container.appendChild(btn);
      });

      messagesArea.appendChild(container);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showCloseChat() {
      const container = document.createElement('div');
      container.id = 'follow-up-chips';
      container.className = 'close-chat-container';

      const btn = document.createElement('button');
      btn.className = 'close-chat-btn';
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> Chat schließen`;
      btn.onclick = () => closeChat();
      container.appendChild(btn);

      messagesArea.appendChild(container);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function closeChat() {
      // Notify native app to close the WebView
      if (window.webkit?.messageHandlers?.toni) {
        window.webkit.messageHandlers.toni.postMessage({ type: 'close' });
      }
      // Fallback for browser: reset the chat
      if (!window.webkit?.messageHandlers?.toni) {
        messagesArea.innerHTML = '';
        quickReplies.style.display = '';
        addMessage('Hi there! I\'m here to help you report any issues you\'re experiencing. What seems to be not working in the app?', 'toni');
      }
    }

    // =============================================
    // TEXT CHAT
    // =============================================
    async function sendMessage() {
      const text = inputField.value.trim();
      if (!text || isBusy) return;
      doSend(text);
    }

    function sendQuickReply(chipEl) {
      if (isBusy) return;
      // Extract text without emoji
      const text = chipEl.textContent.trim();
      doSend(text);
    }

    async function doSend(text) {
      isBusy = true;
      sendBtn.disabled = true;
      inputField.value = '';

      // Hide initial quick replies and any follow-up chips
      quickReplies.style.display = 'none';
      removeFollowUpChips();

      addMessage(text, 'user');
      showTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, voiceKey: 'bella' }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        removeTypingIndicator();
        addMessage(data.response, 'toni', data.audio || null);

        // Show follow-up chips, or close button if conversation ended
        if (data.followUps) {
          showFollowUpChips(data.followUps);
        }

        // If user sent via voice, auto-play the response
        if (inputMode === 'voice' && data.audio) {
          const lastPlayBtn = messagesArea.querySelector('.msg-row.toni:last-child .play-audio-btn');
          if (lastPlayBtn) {
            setTimeout(() => togglePlayAudio(lastPlayBtn), 200);
          }
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage('Oops, da ist etwas schiefgelaufen. Bitte versuche es nochmal!', 'toni');
      }

      isBusy = false;
      sendBtn.disabled = !inputField.value.trim();
    }

    inputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    inputField.addEventListener('input', () => {
      sendBtn.disabled = !inputField.value.trim();
    });

    // =============================================
    // VOICE INPUT (WebSocket conversation)
    // =============================================
    async function toggleVoice() {
      if (isConversationActive) {
        stopConversation();
      } else {
        await startConversation();
      }
    }

    async function startConversation() {
      if (micBtn.disabled) return;
      micBtn.disabled = true;

      try {
        const lang = window.appContext._lang || 'en';
        const res = await fetch(`/api/conversation-url?voice=bella&lang=${lang}`);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const { signedUrl } = await res.json();

        audioContext = new AudioContext();

        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });

        ws = new WebSocket(signedUrl);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          isConversationActive = true;
          inputMode = 'voice';
          micBtn.disabled = false;
          micBtn.classList.add('recording');
          quickReplies.style.display = 'none';
          inputField.placeholder = 'Listening... tap mic to stop';
          inputField.disabled = true;
          startMicCapture();

          ws._pingInterval = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'ping' }));
            }
          }, 10000);
        };

        ws.onmessage = (event) => {
          if (typeof event.data === 'string') {
            handleWSMessage(JSON.parse(event.data));
          } else {
            handleAudioChunk(event.data);
          }
        };

        ws.onerror = () => stopConversation();
        ws.onclose = () => {
          if (ws?._pingInterval) clearInterval(ws._pingInterval);
          if (isConversationActive) stopConversation();
        };

      } catch (err) {
        console.error('Failed to start voice:', err);
        micBtn.disabled = false;
        if (err.name === 'NotAllowedError') {
          addMessage('Mikrofonzugriff wurde verweigert. Bitte erlaube den Zugriff in den Einstellungen.', 'toni');
        }
      }
    }

    function stopConversation() {
      isConversationActive = false;
      inputMode = 'text';
      hasUserSpoken = false;

      if (ws) { if (ws._pingInterval) clearInterval(ws._pingInterval); ws.close(); ws = null; }
      if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

      pcmBuffer = [];
      isPlayingAudio = false;

      micBtn.disabled = false;
      micBtn.classList.remove('recording');
      inputField.placeholder = 'Type your message...';
      inputField.disabled = false;
      setViseme('rest');
    }

    function handleWSMessage(msg) {
      switch (msg.type) {
        case 'conversation_initiation_metadata':
          agentAudioFormat = msg.conversation_initiation_metadata_event?.agent_output_audio_format || 'pcm_16000';
          break;
        case 'agent_response':
          const agentText = msg.agent_response_event?.agent_response || '';
          if (agentText) addMessage(agentText, 'toni');
          break;
        case 'user_transcript':
          const userText = msg.user_transcription_event?.user_transcript || '';
          if (userText) { hasUserSpoken = true; addMessage(userText, 'user'); }
          break;
        case 'audio':
          if (msg.audio_event?.audio_base_64 && hasUserSpoken) handleStreamAudioChunk(msg.audio_event.audio_base_64);
          break;
        case 'ping':
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'pong', event_id: msg.ping_event?.event_id }));
          }
          break;
        case 'interruption':
          clearPlaybackQueue();
          break;
      }
    }

    // ---- Mic capture ----
    function startMicCapture() {
      const source = audioContext.createMediaStreamSource(micStream);
      const inputSampleRate = audioContext.sampleRate;
      const ratio = inputSampleRate / 16000;

      micProcessor = audioContext.createScriptProcessor(4096, 1, 1);
      micProcessor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const outputLength = Math.floor(input.length / ratio);
        const pcm = new Int16Array(outputLength);
        for (let i = 0; i < outputLength; i++) {
          const srcIndex = Math.floor(i * ratio);
          const s = Math.max(-1, Math.min(1, input[srcIndex]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        const bytes = new Uint8Array(pcm.buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({ user_audio_chunk: btoa(binary) }));
      };

      const silentGain = audioContext.createGain();
      silentGain.gain.value = 0;
      source.connect(micProcessor);
      micProcessor.connect(silentGain);
      silentGain.connect(audioContext.destination);
    }

    // ---- Stream audio playback (for voice conversation) ----
    function handleStreamAudioChunk(base64) {
      const raw = atob(base64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

      pcmBuffer.push(float32);

      if (!isPlayingAudio) {
        isPlayingAudio = true;
        schedulePlayback();
        if (!animFrameId) startMouthSync();
      }
    }

    function schedulePlayback() {
      if (pcmBuffer.length === 0) {
        isPlayingAudio = false;
        setTimeout(() => {
          if (!isPlayingAudio) {
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            setViseme('rest');
          }
        }, 300);
        return;
      }

      const samples = pcmBuffer.shift();
      if (!audioContext) audioContext = new AudioContext();

      const audioBuffer = audioContext.createBuffer(1, samples.length, 16000);
      audioBuffer.getChannelData(0).set(samples);

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;

      if (!playbackAnalyser) {
        playbackAnalyser = audioContext.createAnalyser();
        playbackAnalyser.fftSize = 256;
        playbackAnalyser.smoothingTimeConstant = 0.3;
      }
      if (!playbackGain) {
        playbackGain = audioContext.createGain();
        playbackGain.gain.value = 1.0;
        playbackGain.connect(playbackAnalyser);
        playbackAnalyser.connect(audioContext.destination);
      }

      source.connect(playbackGain);
      source.onended = () => schedulePlayback();
      source.start();
    }

    function clearPlaybackQueue() {
      pcmBuffer = [];
      isPlayingAudio = false;
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      setViseme('rest');
    }

    function startMouthSync() {
      const dataArray = new Uint8Array(playbackAnalyser.frequencyBinCount);
      function sync() {
        if (!isPlayingAudio && pcmBuffer.length === 0) {
          setViseme('rest');
          animFrameId = null;
          return;
        }
        playbackAnalyser.getByteFrequencyData(dataArray);
        let sum = 0;
        const start = 1, end = Math.min(30, dataArray.length);
        for (let i = start; i < end; i++) sum += dataArray[i];
        const avg = sum / (end - start);
        let level = avg < 5 ? 0 : avg < 25 ? 1 : avg < 55 ? 2 : avg < 100 ? 3 : 4;
        mouthGroup.innerHTML = volumeMouths[level]();
        animFrameId = requestAnimationFrame(sync);
      }
      sync();
    }

    // =============================================
    // EYE HELPERS
    // =============================================
    function setEyeWhite(id, props) {
      const el = id === 'left' ? leftEyeWhite : rightEyeWhite;
      const d = id === 'left' ? DEFAULT.leftWhite : DEFAULT.rightWhite;
      el.setAttribute('cx', props.cx ?? d.cx);
      el.setAttribute('cy', props.cy ?? d.cy);
      el.setAttribute('rx', props.rx ?? d.rx);
      el.setAttribute('ry', props.ry ?? d.ry);
      el.style.display = props.hidden ? 'none' : '';
    }

    function setEye(id, props) {
      const g = id === 'left' ? leftEye : rightEye;
      const defaults = id === 'left' ? { cx: 940, cy: 1130, r: 95 } : { cx: 1438, cy: 1130, r: 95 };
      g.innerHTML = '';
      g.style.display = props.hidden ? 'none' : '';
      if (props.type === 'normal' || !props.type) {
        const cx = props.cx ?? defaults.cx, cy = props.cy ?? defaults.cy, r = props.r ?? defaults.r;
        g.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${props.fill ?? '#0B0F31'}"/><circle cx="${cx + (props.hlX ?? 30)}" cy="${cy + (props.hlY ?? -35)}" r="${props.hlR ?? 28}" fill="white"/>`;
      } else if (props.type === 'closed-happy') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<path d="M${cx-90} 1150 Q${cx} 1040 ${cx+90} 1150" stroke="#0B0F31" stroke-width="50" stroke-linecap="round" fill="none"/>`;
      } else if (props.type === 'closed-sleepy') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<line x1="${cx-85}" y1="1130" x2="${cx+85}" y2="1130" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/>`;
      } else if (props.type === 'x') {
        const cx = id === 'left' ? 915 : 1413, cy = 1116;
        g.innerHTML = `<line x1="${cx-65}" y1="${cy-65}" x2="${cx+65}" y2="${cy+65}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/><line x1="${cx+65}" y1="${cy-65}" x2="${cx-65}" y2="${cy+65}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/>`;
      } else if (props.type === 'heart') {
        const cx = id === 'left' ? 915 : 1413, cy = 1116, s = props.scale ?? 1;
        g.innerHTML = `<path d="M${cx} ${cy+50*s} L${cx-70*s} ${cy-10*s} A${50*s} ${50*s} 0 0 1 ${cx} ${cy-55*s} A${50*s} ${50*s} 0 0 1 ${cx+70*s} ${cy-10*s} Z" fill="#E8345A"/>`;
      } else if (props.type === 'wink') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<path d="M${cx-80} 1130 Q${cx} 1180 ${cx+80} 1130" stroke="#0B0F31" stroke-width="48" stroke-linecap="round" fill="none"/>`;
      }
    }

    function setBrow(id, props) {
      const el = id === 'left' ? leftBrow : rightBrow;
      if (!props || props.hidden) { el.style.display = 'none'; return; }
      el.style.display = '';
      el.setAttribute('d', props.d);
    }

    // =============================================
    // BLINKING
    // =============================================
    const NO_BLINK = ['love', 'sleepy', 'dead', 'cheeky'];

    function scheduleBlink() {
      if (blinkTimeout) clearTimeout(blinkTimeout);
      blinkTimeout = setTimeout(() => {
        if (NO_BLINK.includes(currentExpression)) { scheduleBlink(); return; }
        doBlink();
      }, 2200 + Math.random() * 2000);
    }

    function doBlink() {
      const savedL = leftEye.innerHTML, savedR = rightEye.innerHTML;
      const savedLRy = leftEyeWhite.getAttribute('ry'), savedRRy = rightEyeWhite.getAttribute('ry');
      const savedLCy = leftEyeWhite.getAttribute('cy'), savedRCy = rightEyeWhite.getAttribute('cy');
      leftEyeWhite.setAttribute('ry', '30'); rightEyeWhite.setAttribute('ry', '30');
      leftEyeWhite.setAttribute('cy', '1140'); rightEyeWhite.setAttribute('cy', '1140');
      leftEye.innerHTML = ''; rightEye.innerHTML = '';
      setTimeout(() => {
        leftEyeWhite.setAttribute('ry', savedLRy); rightEyeWhite.setAttribute('ry', savedRRy);
        leftEyeWhite.setAttribute('cy', savedLCy); rightEyeWhite.setAttribute('cy', savedRCy);
        leftEye.innerHTML = savedL; rightEye.innerHTML = savedR;
        scheduleBlink();
      }, 120);
    }

    // =============================================
    // EXPRESSIONS
    // =============================================
    function resetFace() {
      setEyeWhite('left', {});
      setEyeWhite('right', {});
      setEye('left', { type: 'normal' });
      setEye('right', { type: 'normal' });
      setBrow('left', { hidden: true });
      setBrow('right', { hidden: true });
      setViseme('rest');
      document.querySelectorAll('.expression-chips button').forEach(b => b.classList.remove('active'));
    }

    function setExpression(expr) {
      resetFace();
      currentExpression = expr;
      const btn = document.getElementById('btn-' + expr);
      if (btn) btn.classList.add('active');

      switch (expr) {
        case 'happy': setViseme('rest'); break;
        case 'excited':
          setEye('left', { type: 'closed-happy' }); setEye('right', { type: 'closed-happy' });
          setEyeWhite('left', { hidden: true }); setEyeWhite('right', { hidden: true });
          mouthGroup.innerHTML = visemes.AEI(); break;
        case 'surprised':
          setEyeWhite('left', { ry: 280 }); setEyeWhite('right', { ry: 280 });
          setEye('left', { type: 'normal', r: 80, cy: 1120, hlR: 24 }); setEye('right', { type: 'normal', r: 80, cy: 1120, hlR: 24 });
          setBrow('left', { d: 'M810 815 Q915 770 1020 815' }); setBrow('right', { d: 'M1308 815 Q1413 770 1518 815' });
          setViseme('O'); break;
        case 'sad':
          setEyeWhite('left', { ry: 220, cy: 1130 }); setEyeWhite('right', { ry: 220, cy: 1130 });
          setEye('left', { type: 'normal', cy: 1150, r: 85, hlY: -28 }); setEye('right', { type: 'normal', cy: 1150, r: 85, hlY: -28 });
          setBrow('left', { d: 'M810 855 Q910 810 1020 870' }); setBrow('right', { d: 'M1308 870 Q1418 810 1518 855' });
          mouthGroup.innerHTML = `<path d="M${MX-180} ${MY+40} Q${MX} ${MY-50} ${MX+180} ${MY+40}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`; break;
        case 'angry':
          setEyeWhite('left', { ry: 200, cy: 1130 }); setEyeWhite('right', { ry: 200, cy: 1130 });
          setEye('left', { type: 'normal', cy: 1140, r: 90 }); setEye('right', { type: 'normal', cy: 1140, r: 90 });
          setBrow('left', { d: 'M790 830 L1040 895' }); setBrow('right', { d: 'M1288 895 L1538 830' });
          setViseme('BMP'); break;
        case 'love':
          setEye('left', { type: 'heart', scale: 1.2 }); setEye('right', { type: 'heart', scale: 1.2 });
          mouthGroup.innerHTML = `<path d="M${MX-200} ${MY} Q${MX} ${MY+110} ${MX+200} ${MY}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`; break;
        case 'sleepy':
          setEye('left', { type: 'closed-sleepy' }); setEye('right', { type: 'closed-sleepy' });
          setEyeWhite('left', { ry: 160, cy: 1130 }); setEyeWhite('right', { ry: 160, cy: 1130 });
          mouthGroup.innerHTML = `<path d="M${MX-80} ${MY} Q${MX} ${MY+40} ${MX+80} ${MY}" stroke="#0B0F31" stroke-width="40" stroke-linecap="round" fill="none"/>`; break;
        case 'skeptical':
          setEyeWhite('right', { ry: 170, cy: 1140 });
          setEye('left', { type: 'normal', cx: 950, cy: 1130 }); setEye('right', { type: 'normal', cx: 1445, cy: 1145, r: 80 });
          setBrow('left', { d: 'M810 800 Q915 770 1020 800' });
          mouthGroup.innerHTML = `<path d="M${MX-170} ${MY+10} Q${MX-50} ${MY+50} ${MX+170} ${MY-20}" stroke="#0B0F31" stroke-width="44" stroke-linecap="round" fill="none"/>`; break;
        case 'cheeky':
          setEye('left', { type: 'normal', cx: 935, cy: 1120 }); setEye('right', { type: 'wink' });
          setEyeWhite('right', { ry: 170, cy: 1130 });
          mouthGroup.innerHTML = visemes.AEI(); break;
        case 'dead':
          setEye('left', { type: 'x' }); setEye('right', { type: 'x' });
          setEyeWhite('left', { hidden: true }); setEyeWhite('right', { hidden: true });
          mouthGroup.innerHTML = `<path d="M${MX-170} ${MY} Q${MX-80} ${MY-30} ${MX} ${MY+10} Q${MX+80} ${MY+40} ${MX+170} ${MY-10}" stroke="#0B0F31" stroke-width="44" stroke-linecap="round" fill="none"/>`; break;
        case 'lookaway':
          setEye('left', { type: 'normal', cx: 870, cy: 1110, hlX: 25, hlY: -30 }); setEye('right', { type: 'normal', cx: 1370, cy: 1110, hlX: 25, hlY: -30 });
          mouthGroup.innerHTML = `<path d="M${MX-100} ${MY} Q${MX} ${MY+40} ${MX+100} ${MY}" stroke="#0B0F31" stroke-width="42" stroke-linecap="round" fill="none"/>`; break;
      }
      scheduleBlink();
    }

    // =============================================
    // DEBUG PANEL
    // =============================================
    function toggleDebugPanel() {
      document.getElementById('debug-panel').classList.toggle('open');
    }

    // =============================================
    // INIT
    // =============================================
    setExpression('happy');
    scheduleBlink();

    // Welcome message from Toni
    addMessage('Hi there! I\'m here to help you report any issues you\'re experiencing. What seems to be not working in the app?', 'toni');
  </script>
