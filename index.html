<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Toni</title>
  <style>
    /* ── Design System Tokens ── */
    :root {
      /* Brand Primary */
      --primary-900: #0B0F31;
      --primary-800: #141A5C;
      --primary-700: #1E2678;
      --primary-600: #2833AC;
      --primary-500: #3949F5;
      --primary-400: #5B6BF7;
      --primary-300: #8691FA;
      --primary-200: #B0B7FC;
      --primary-100: #D5D9FD;
      --primary-50: #EAECFE;
      --primary-25: #F4F5FF;
      --primary-10: #F9F9FF;

      /* Surfaces */
      --surface-background: #F4F5FF;
      --surface-container: #FFFFFF;
      --surface-container-low: #FAFAFF;
      --surface-container-high: #EAECFE;

      /* Semantic */
      --text-primary: #0B0F31;
      --text-secondary: #5A5E7A;
      --text-tertiary: #8E91A8;
      --text-on-primary: #FFFFFF;
      --error: #E8345A;
      --error-hover: #C02040;

      /* Button */
      --btn-primary: #3949F5;
      --btn-primary-hover: #2833AC;
      --btn-primary-pressed: #1E2678;
      --btn-secondary-pressed: #EBECFC;
      --btn-disabled: #C8CAD8;

      /* Border */
      --border-neutral-light: #F1F2F5;
      --border-brand: #D7DBFD;
      --border-brand-3: #8691FA;

      /* Elevation */
      --elevation-standard: #F1F2F5;

      /* Corner Radius */
      --cr-5: 5px;
      --cr-10: 10px;
      --cr-20: 20px;
      --cr-30: 30px;
      --cr-40: 40px;
      --cr-80: 80px;
      --cr-round: 999px;

      /* Typography */
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      /* Font Sizes */
      --label-small: 11px;
      --label-medium: 12px;
      --label-large: 14px;
      --body-small: 13px;
      --body-medium: 14px;
      --body-large: 16px;
      --title-small: 16px;
      --title-medium: 20px;
      --title-large: 24px;

      /* Spacing */
      --space-xs: 4px;
      --space-s: 8px;
      --space-m: 12px;
      --space-l: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: var(--surface-background);
      font-family: var(--font-family);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Chat Container ── */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: var(--surface-container);
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: var(--space-m);
      padding: var(--space-l) var(--space-xl);
      border-bottom: 1px solid var(--border-neutral-light);
      background: var(--surface-container);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .header-avatar svg {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-name {
      font-size: var(--title-small);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .header-subtitle {
      font-size: var(--label-medium);
      font-weight: var(--weight-regular);
      color: var(--text-tertiary);
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: var(--space-s);
    }
    .header-icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--cr-round);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      transition: background 0.15s;
    }
    .header-icon-btn:hover {
      background: var(--primary-50);
    }
    .header-icon-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ── Messages Area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-l);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--primary-200); border-radius: 2px; }

    /* ── Message Bubbles ── */
    .msg-row {
      display: flex;
      gap: var(--space-s);
      max-width: 85%;
    }
    .msg-row.toni { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-bubble {
      padding: var(--space-m) var(--space-l);
      font-size: var(--body-medium);
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg-row.toni .msg-bubble {
      background: var(--surface-container-high);
      border-radius: var(--cr-20) var(--cr-20) var(--cr-20) var(--cr-5);
      color: var(--text-primary);
    }
    .msg-row.user .msg-bubble {
      background: var(--primary-50);
      border-radius: var(--cr-20) var(--cr-20) var(--cr-5) var(--cr-20);
      color: var(--text-primary);
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: var(--space-s);
      margin-top: var(--space-xs);
    }
    .msg-time {
      font-size: var(--label-small);
      color: var(--text-tertiary);
    }

    /* ── Play Audio Button (from design system) ── */
    .play-audio-btn {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border-neutral-light);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      box-shadow: 0 2px 0 0 var(--elevation-standard);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .play-audio-btn:hover {
      border-color: var(--border-brand);
      background: var(--primary-50);
    }
    .play-audio-btn:active {
      background: var(--btn-secondary-pressed);
      border-color: var(--border-brand);
      box-shadow: none;
    }
    .play-audio-btn.playing {
      border-color: var(--border-brand);
      background: var(--surface-container);
    }
    .play-audio-btn.playing .progress-ring {
      display: block;
    }
    .play-audio-btn svg.icon {
      width: 16px;
      height: 16px;
      fill: var(--primary-500);
    }
    .play-audio-btn .progress-ring {
      display: none;
      position: absolute;
      inset: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
    }
    .play-audio-btn .progress-ring circle {
      fill: none;
      stroke: var(--primary-500);
      stroke-width: 2;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 0.1s linear;
    }

    /* ── Quick Reply Chips ── */
    .quick-replies {
      padding: 0 var(--space-xl) var(--space-l);
      flex-shrink: 0;
    }
    .quick-replies-label {
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      color: var(--text-tertiary);
      margin-bottom: var(--space-s);
    }
    .chips-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-s);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid var(--primary-100);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .chip:hover {
      background: var(--primary-50);
      border-color: var(--primary-500);
      color: var(--btn-primary);
    }
    .chip:active {
      background: var(--btn-secondary-pressed);
    }
    .chip-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ── Close Chat Button ── */
    .close-chat-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-m);
      padding: var(--space-xl) 0;
      align-self: center;
    }
    .close-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-s);
      padding: 12px var(--space-xxl);
      border: none;
      border-radius: var(--cr-30);
      background: var(--btn-primary);
      color: var(--text-on-primary);
      font-family: var(--font-family);
      font-size: var(--body-medium);
      font-weight: var(--weight-semibold);
      cursor: pointer;
      transition: all 0.15s;
    }
    .close-chat-btn:hover { background: var(--btn-primary-hover); }

    /* ── Follow-up Chips (in chat) ── */
    .follow-up-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-s);
      padding: var(--space-xs) 0;
      align-self: flex-start;
    }
    .chip.follow-up {
      background: var(--surface-container);
      border-color: var(--primary-100);
      color: var(--primary-500);
      font-weight: var(--weight-medium);
    }
    .chip.follow-up:hover {
      background: var(--primary-50);
      border-color: var(--btn-primary);
      color: var(--primary-700);
    }

    /* ── Input Bar ── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: var(--space-s);
      padding: var(--space-m) var(--space-xl) var(--space-xl);
      border-top: 1px solid var(--border-neutral-light);
      background: var(--surface-container);
      flex-shrink: 0;
      overflow: hidden;
    }
    .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .input-field {
      width: 100%;
      padding: 10px var(--space-l);
      border: 1.5px solid var(--primary-200);
      border-radius: var(--cr-30);
      font-family: var(--font-family);
      font-size: var(--body-medium);
      color: var(--text-primary);
      background: var(--surface-container-low);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-field::placeholder { color: var(--text-tertiary); }
    .input-field:focus {
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(57, 73, 245, 0.1);
    }

    /* Mic button (voice mode toggle) */
    .mic-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--btn-primary);
      box-shadow: 0px 2px 0px 0px var(--elevation-standard);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .mic-btn svg { width: 20px; height: 20px; fill: white; }
    .mic-btn:hover {
      background: var(--btn-primary-hover);
    }
    .mic-btn:active {
      background: var(--btn-primary-pressed);
      box-shadow: none;
    }
    .mic-btn.recording {
      background: var(--primary-500);
      box-shadow: 0px 2px 0px 0px var(--elevation-standard);
    }
    .mic-btn.recording svg { fill: white; }

    /* ── Recording Overlay ── */
    .recording-overlay {
      display: flex;
      align-items: center;
      gap: var(--space-s);
      width: 100%;
      height: 40px;
      padding: 0 var(--space-l);
      border-radius: var(--cr-30);
      background: var(--surface-container-low);
      border: 1.5px solid var(--primary-300);
      box-shadow: 0 0 0 3px rgba(57, 73, 245, 0.1);
      overflow: hidden;
    }
    .recording-cancel-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .recording-cancel-btn:hover {
      background: var(--primary-50);
      color: var(--error);
    }
    .recording-cancel-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .waveform-container {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: var(--space-s);
      overflow: hidden;
    }
    .recording-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      flex-shrink: 0;
      animation: recordingDotPulse 1.5s ease-in-out infinite;
    }
    @keyframes recordingDotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .waveform-bars {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2px;
      height: 28px;
      overflow: hidden;
      flex-wrap: nowrap;
    }
    .waveform-bars .bar {
      width: 3px;
      min-height: 3px;
      max-height: 28px;
      border-radius: 2px;
      background: var(--primary-400);
      flex-shrink: 0;
    }
    .listening-dots .dots::after {
      content: '';
      animation: listeningDots 1.5s steps(4, end) infinite;
    }
    @keyframes listeningDots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
    .recording-timer {
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      min-width: 32px;
    }
    .recording-stop-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--btn-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      box-shadow: 0px 2px 0px 0px var(--elevation-standard);
    }
    .recording-stop-btn:hover {
      background: var(--btn-primary-hover);
    }
    .recording-stop-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* Send button (replaces mic button when typing) */
    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--btn-primary);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      box-shadow: 0px 2px 0px 0px var(--elevation-standard);
    }
    .send-btn svg { width: 20px; height: 20px; fill: white; }
    .send-btn:hover { background: var(--btn-primary-hover); }

    /* ── Loading dots ── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: var(--space-m) var(--space-l);
      align-items: center;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary-300);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Debug Panel (expression showcase) ── */
    .debug-panel {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-container);
      border-top: 1px solid var(--primary-100);
      padding: var(--space-l);
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .debug-panel.open { display: block; }
    .debug-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-m);
    }
    .debug-panel-title {
      font-size: var(--label-large);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .debug-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 20px;
      line-height: 1;
    }
    .debug-stage {
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-m);
    }
    .debug-stage svg {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }
    .expression-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .expression-chips button {
      padding: 6px 14px;
      border: 1.5px solid var(--primary-200);
      border-radius: var(--cr-round);
      background: var(--surface-container);
      color: var(--text-secondary);
      font-family: var(--font-family);
      font-size: var(--label-medium);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all 0.15s;
    }
    .expression-chips button:hover {
      background: var(--primary-50);
      border-color: var(--primary-400);
      color: var(--btn-primary);
    }
    .expression-chips button.active {
      background: var(--btn-primary);
      color: var(--text-on-primary);
      border-color: var(--btn-primary);
    }

    /* Ensure safe area on iOS */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .input-bar {
        padding-bottom: calc(var(--space-xl) + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>

  <script>
    // =============================================
    // ELEMENT REFS
    // =============================================
    const leftEyeWhite = document.getElementById('left-eye-white');
    const rightEyeWhite = document.getElementById('right-eye-white');
    const leftEye = document.getElementById('left-eye');
    const rightEye = document.getElementById('right-eye');
    const leftBrow = document.getElementById('left-brow');
    const rightBrow = document.getElementById('right-brow');
    const mouthGroup = document.getElementById('mouth-group');
    const messagesArea = document.getElementById('messages-area');
    const inputField = document.getElementById('input-field');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const quickReplies = document.getElementById('quick-replies');

    // =============================================
    // APP CONTEXT (received from native WebView host)
    // =============================================
    window.appContext = window.appContext || {};

    window.setAppContext = function(ctx) {
      window.appContext = ctx;
      console.log('App context received:', ctx);

      // Detect language
      const lang = (ctx.language || '').toLowerCase().slice(0, 2);
      if (lang === 'en' || lang === 'de') {
        appLang = lang;
      }
      window.appContext._lang = appLang;
      applyLanguage();

      if (ctx.entrypoint) {
        console.log('Entrypoint:', ctx.entrypoint);
      }
      if (window.webkit?.messageHandlers?.toni) {
        window.webkit.messageHandlers.toni.postMessage({ type: 'ready' });
      }

      // DEBUG: show app context as a message (remove before shipping)
      const debugLines = Object.entries(ctx)
        .filter(([k]) => k !== '_lang')
        .map(([k, v]) => `${k}: ${v || '–'}`)
        .join('\n');
      const debugRow = document.createElement('div');
      debugRow.className = 'msg-row toni';
      debugRow.id = 'debug-context-msg';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.style.cssText = 'font-size: 11px; font-family: monospace; white-space: pre-wrap; opacity: 0.6; background: var(--surface-container-low); border: 1px dashed var(--primary-200);';
      bubble.textContent = '🐛 DEBUG — App Context:\n' + debugLines;
      debugRow.appendChild(bubble);
      messagesArea.appendChild(debugRow);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    };

    // =============================================
    // STATE
    // =============================================
    let currentExpression = 'happy';
    let blinkTimeout = null;
    let isBusy = false;
    let appLang = 'de'; // detected from appContext or browser

    // =============================================
    // i18n — UI text translations
    // =============================================
    const i18n = {
      de: {
        headerSubtitle: 'Immer für dich da',
        inputPlaceholder: 'Nachricht eingeben...',
        chipsLabel: 'Wähle ein häufiges Problem:',
        chips: [
          { icon: '⚡', text: 'App stürzt ab' },
          { icon: '🔑', text: 'Login-Probleme' },
          { icon: '💳', text: 'Zahlungsprobleme' },
          { icon: '⚙️', text: 'Funktion geht nicht' },
          { icon: '🐌', text: 'App ist langsam' },
          { icon: '🎨', text: 'Anzeige-Problem' },
          { icon: '🔄', text: 'Daten-Synchronisation' },
          { icon: '💬', text: 'Anderes Feedback' },
          { icon: '✉️', text: 'Support kontaktieren', action: 'mailto' },
        ],
        welcome: 'Hi! Ich bin Toni, dein Helfer in der myReha App. Was kann ich für dich tun?',
        closeChat: 'Chat schließen',
        listening: 'Ich höre zu... tippe auf Mikrofon zum Stoppen',
      },
      en: {
        headerSubtitle: 'Always here to help',
        inputPlaceholder: 'Type your message...',
        chipsLabel: 'Select a common issue to get started quickly:',
        chips: [
          { icon: '⚡', text: 'App crashes or freezes' },
          { icon: '🔑', text: 'Login issues' },
          { icon: '💳', text: 'Payment problems' },
          { icon: '⚙️', text: 'Feature not working' },
          { icon: '🐌', text: 'App is too slow' },
          { icon: '🎨', text: 'Display or UI issue' },
          { icon: '🔄', text: 'Data sync problem' },
          { icon: '💬', text: 'Other feedback' },
          { icon: '✉️', text: 'Contact support', action: 'mailto' },
        ],
        welcome: 'Hi! I\'m Toni, your helper in the myReha app. How can I help you?',
        closeChat: 'Close chat',
        listening: 'Listening... tap mic to stop',
      },
    };

    function t(key) {
      return (i18n[appLang] || i18n.de)[key] || (i18n.de)[key];
    }

    function applyLanguage() {
      document.querySelector('.header-subtitle').textContent = t('headerSubtitle');
      inputField.placeholder = t('inputPlaceholder');

      // Rebuild initial chips
      const label = document.querySelector('.quick-replies-label');
      if (label) label.textContent = t('chipsLabel');
      const scroll = document.querySelector('.chips-scroll');
      if (scroll) {
        scroll.innerHTML = '';
        t('chips').forEach(chip => {
          const btn = document.createElement('button');
          btn.className = 'chip';
          if (chip.action === 'mailto') {
            btn.onclick = () => { window.location.href = 'mailto:support@nyra.health'; };
          } else {
            btn.onclick = () => sendQuickReply(btn);
          }
          btn.innerHTML = `<span class="chip-icon">${chip.icon}</span> ${chip.text}`;
          scroll.appendChild(btn);
        });
      }
    }

    // Audio playback state (for Toni's responses)
    let audioContext = null;
    let animFrameId = null;
    let pcmBuffer = [];
    let isPlayingAudio = false;
    let playbackGain = null;
    let playbackAnalyser = null;

    // Track currently playing message audio
    let currentPlayingBtn = null;
    let currentPlayingSource = null;

    const MX = 1161, MY = 1490;
    const DEFAULT = {
      leftWhite: { cx: 915, cy: 1116, rx: 180, ry: 259 },
      rightWhite: { cx: 1413, cy: 1116, rx: 180, ry: 259 },
    };

    // =============================================
    // VISEME MOUTH SHAPES
    // =============================================
    const visemes = {
      rest: () => `<path d="M${MX-200} ${MY} Q${MX} ${MY+90} ${MX+200} ${MY}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`,
      BMP: () => `<path d="M${MX-170} ${MY} L${MX+170} ${MY}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round" fill="none"/>`,
      AEI: () => {
        const w = 180, h = 110;
        return `<ellipse cx="${MX}" cy="${MY+10}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+10}" width="${w*2}" height="40" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-40}" width="${w*2-30}" height="35" rx="6" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY+h-25}" rx="70" ry="42" fill="#E8345A"/>`;
      },
      Ee: () => {
        const w = 185, h = 60;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h}" width="${w*2}" height="35" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-32}" width="${w*2-30}" height="28" rx="6" fill="white" opacity="0.95"/>`;
      },
      UQW: () => `<ellipse cx="${MX}" cy="${MY+5}" rx="60" ry="72" fill="#0B0F31"/>`,
      O: () => `<ellipse cx="${MX}" cy="${MY+5}" rx="85" ry="95" fill="#0B0F31"/>`,
      CDNSTZ: () => {
        const w = 155, h = 38;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w+10}" y="${MY-8}" width="${(w-10)*2}" height="16" rx="4" fill="white" opacity="0.95"/>`;
      },
      GK: () => {
        const w = 160, h = 55;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h}" width="${w*2}" height="30" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-28}" width="${w*2-30}" height="24" rx="6" fill="white" opacity="0.95"/>`;
      },
      Th: () => {
        const w = 140, h = 35;
        return `<ellipse cx="${MX}" cy="${MY}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w+5}" y="${MY-h}" width="${(w-5)*2}" height="25" rx="5" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY+h-8}" rx="50" ry="22" fill="#E8345A"/>`;
      },
      FV: () => {
        const w = 155, h = 30;
        return `<path d="M${MX-w} ${MY-5} Q${MX} ${MY-h-10} ${MX+w} ${MY-5}" stroke="#0B0F31" stroke-width="6" fill="none"/>
          <ellipse cx="${MX}" cy="${MY+5}" rx="${w-10}" ry="${h-5}" fill="#0B0F31"/>
          <rect x="${MX-w+10}" y="${MY-h+15}" width="${(w-10)*2}" height="22" rx="4" fill="white" opacity="0.95"/>`;
      },
      L: () => {
        const w = 165, h = 80;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="32" rx="6" fill="white" opacity="0.95"/>
          <rect x="${MX-w+15}" y="${MY+h-28}" width="${w*2-30}" height="24" rx="6" fill="white" opacity="0.95"/>
          <ellipse cx="${MX}" cy="${MY-h+40}" rx="45" ry="28" fill="#E8345A"/>`;
      },
      R: () => {
        const w = 120, h = 65;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="28" rx="5" fill="white" opacity="0.95"/>`;
      },
      H: () => {
        const w = 160, h = 90;
        return `<ellipse cx="${MX}" cy="${MY+5}" rx="${w}" ry="${h}" fill="#0B0F31"/>
          <rect x="${MX-w}" y="${MY-h+5}" width="${w*2}" height="30" rx="6" fill="white" opacity="0.95"/>`;
      },
    };

    const volumeMouths = [
      () => visemes.rest(),
      () => visemes.BMP(),
      () => visemes.CDNSTZ(),
      () => visemes.Ee(),
      () => visemes.AEI(),
    ];

    function setViseme(name) {
      const fn = visemes[name];
      if (fn) mouthGroup.innerHTML = fn();
    }

    // =============================================
    // MESSAGE RENDERING
    // =============================================
    function getTimeString() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, role, audioBase64, options = {}) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (options.typewriter && role === 'toni') {
        bubble.textContent = '';
        row.appendChild(bubble);
        // If immediateAudio, add meta right away so audio can start playing during typewriter
        if (options.immediateAudio) {
          addMeta(row, role, audioBase64);
        }
        messagesArea.appendChild(row);
        typewriterEffect(bubble, text, options.typewriterSpeed || 25, () => {
          // Add meta after typing finishes (only if not already added)
          if (!options.immediateAudio) {
            addMeta(row, role, audioBase64);
          }
          messagesArea.scrollTop = messagesArea.scrollHeight;
          if (options.onComplete) options.onComplete();
        });
      } else {
        bubble.textContent = text;
        row.appendChild(bubble);
        messagesArea.appendChild(row);
        addMeta(row, role, audioBase64);
      }

      messagesArea.scrollTop = messagesArea.scrollHeight;
      return row;
    }

    function addMeta(row, role, audioBase64) {
      if (role === 'toni') {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';

        if (audioBase64) {
          const playBtn = document.createElement('button');
          playBtn.className = 'play-audio-btn';
          playBtn.innerHTML = `
            <svg class="progress-ring" viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" stroke-dasharray="94.25" stroke-dashoffset="0"/></svg>
            <svg class="icon icon-volume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg class="icon icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg class="icon icon-play" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>`;
          playBtn._audioBase64 = audioBase64;
          playBtn.onclick = () => togglePlayAudio(playBtn);
          meta.appendChild(playBtn);
        }

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = getTimeString();
        meta.appendChild(time);
        row.appendChild(meta);
      } else {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.style.justifyContent = 'flex-end';
        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = getTimeString();
        meta.appendChild(time);
        row.appendChild(meta);
      }
    }

    // Typewriter effect — reveals text character by character
    function typewriterEffect(element, text, speed, onComplete) {
      let i = 0;
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          messagesArea.scrollTop = messagesArea.scrollHeight;
          setTimeout(type, speed);
        } else {
          if (onComplete) onComplete();
        }
      }
      type();
    }

    function showTypingIndicator() {

    // =============================================
    // PLAY AUDIO (per-message)
    // =============================================
    async function togglePlayAudio(btn) {
      // If already playing this one, stop it
      if (currentPlayingBtn === btn) {
        stopCurrentAudio();
        return;
      }
      // Stop any other playing audio
      if (currentPlayingBtn) stopCurrentAudio();

      if (!audioContext) audioContext = new AudioContext();

      const raw = atob(btn._audioBase64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      const audioBuffer = await audioContext.decodeAudioData(bytes.buffer.slice(0));

      if (!playbackAnalyser) {
        playbackAnalyser = audioContext.createAnalyser();
        playbackAnalyser.fftSize = 256;
        playbackAnalyser.smoothingTimeConstant = 0.3;
      }
      if (!playbackGain) {
        playbackGain = audioContext.createGain();
        playbackGain.gain.value = 1.0;
        playbackGain.connect(playbackAnalyser);
        playbackAnalyser.connect(audioContext.destination);
      }

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(playbackGain);

      currentPlayingBtn = btn;
      currentPlayingSource = source;
      isPlayingAudio = true;

      // Update button state
      btn.classList.add('playing');
      btn.querySelector('.icon-volume').style.display = 'none';
      btn.querySelector('.icon-pause').style.display = 'block';
      btn.querySelector('.icon-play').style.display = 'none';

      // Start mouth sync
      if (!animFrameId) startMouthSync();

      // Animate progress ring
      const duration = audioBuffer.duration;
      const circle = btn.querySelector('.progress-ring circle');
      const circumference = 94.25;
      const startTime = audioContext.currentTime;
      function updateProgress() {
        if (currentPlayingBtn !== btn) return;
        const elapsed = audioContext.currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        circle.style.strokeDashoffset = circumference * (1 - progress);
        if (progress < 1) requestAnimationFrame(updateProgress);
      }
      updateProgress();

      source.onended = () => {
        if (currentPlayingBtn === btn) {
          stopCurrentAudio();
          // Show replay state
          btn.querySelector('.icon-volume').style.display = 'none';
          btn.querySelector('.icon-pause').style.display = 'none';
          btn.querySelector('.icon-play').style.display = 'block';
        }
      };
      source.start();
    }

    function stopCurrentAudio() {
      if (currentPlayingSource) {
        try { currentPlayingSource.stop(); } catch(e) {}
        currentPlayingSource = null;
      }
      if (currentPlayingBtn) {
        currentPlayingBtn.classList.remove('playing');
        currentPlayingBtn.querySelector('.icon-volume').style.display = 'block';
        currentPlayingBtn.querySelector('.icon-pause').style.display = 'none';
        currentPlayingBtn.querySelector('.icon-play').style.display = 'none';
        const circle = currentPlayingBtn.querySelector('.progress-ring circle');
        circle.style.strokeDashoffset = '0';
        currentPlayingBtn = null;
      }
      isPlayingAudio = false;
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      setViseme('rest');
    }

    // =============================================
    // DYNAMIC FOLLOW-UP CHIPS

    function removeFollowUpChips() {

      if (existing) existing.remove();

    function showFollowUpChips(chips) {

    function closeChat() {

    // =============================================
    // CONVERSATION TRACKING (for Linear tickets)
    // =============================================
    let conversationLog = []; // { role: 'user'|'toni', text: '...' }
    let reportArea = null; // which area the user reported: exercise, login, dashboard, etc.
    let ticketAlreadyCreated = false; // prevent duplicate tickets

    // =============================================
    // TONI INTRODUCTION (avatar tap)
    // =============================================

    async function toniIntroduce() {

    // =============================================
    // TEXT CHAT
    // =============================================
    async function sendMessage() {
      const text = inputField.value.trim();
      if (!text || isBusy) return;
      doSend(text);
    }

    function sendQuickReply(chipEl) {

    async function doSend(text) {
      isBusy = true;
      inputField.value = '';
      updateInputButton(); // swap back to mic button

      // Hide initial quick replies and any follow-up chips
      quickReplies.style.display = 'none';
      removeFollowUpChips();

      // Track conversation
      conversationLog.push({ role: 'user', text });

      // Detect area from "Problem melden" flow chips
      const areaMap = {
        'Bei einer Übung': 'Exercise',
        'Beim Einloggen': 'Login / Authentication',
        'Im Dashboard': 'Dashboard',
        'Woanders': 'Other',
        'Bei bestimmter Übung': 'Specific Exercise',
        'Passiert zufällig': 'Random / Intermittent',
        'Gleich nach dem Start': 'App Launch',
      };
      if (areaMap[text]) reportArea = areaMap[text];

      addMessage(text, 'user');
      await sendToToni(text);
    }

    // Shared function: fetch Toni's response and display it
    async function sendToToni(text) {
      isBusy = true;

      // Detect area
      const areaMap = {
        'Bei einer Übung': 'Exercise',
        'Beim Einloggen': 'Login / Authentication',
        'Im Dashboard': 'Dashboard',
        'Woanders': 'Other',
        'Bei bestimmter Übung': 'Specific Exercise',
        'Passiert zufällig': 'Random / Intermittent',
        'Gleich nach dem Start': 'App Launch',
      };
      if (areaMap[text]) reportArea = areaMap[text];

      showTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, voiceKey: 'bella', lang: appLang }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        removeTypingIndicator();

        // Track Toni's response
        conversationLog.push({ role: 'toni', text: data.response });

        const msgRow = addMessage(data.response, 'toni', data.audio || null, {
          typewriter: true,
          typewriterSpeed: 18,
          // When toniSpeaksMode is on, add meta immediately (not after typewriter)
          immediateAudio: toniSpeaksMode,
          onComplete: () => {
            // Auto-create Linear ticket when the server signals it (only once)
            if (data.createTicket && !ticketAlreadyCreated) {
              ticketAlreadyCreated = true;
              createTicket().then(result => {
                if (result && result.ticketId) {
                  console.log('Ticket created:', result.ticketId, result.ticketUrl);
                }
              });
            }

            // Show follow-up chips after typing finishes
            if (data.followUps !== null && data.followUps !== undefined) {
              showFollowUpChips(data.followUps);
            }
            // If NOT in toni speaks mode (text-only), the play button was already added by onComplete
            // If in toni speaks mode, audio was already started below
          }
        });

        // If toni speaks mode, start audio immediately (parallel with typewriter)
        if (toniSpeaksMode && data.audio) {
          setTimeout(() => {
            const playBtn = msgRow?.querySelector('.play-audio-btn');
            console.log('[Voice] Auto-play simultaneous:', !!playBtn);
            if (playBtn) togglePlayAudio(playBtn);
          }, 100);
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage('Oops, da ist etwas schiefgelaufen. Bitte versuche es nochmal!', 'toni');
      }

      isBusy = false;
      updateInputButton();
    }

    // =============================================
    // LINEAR TICKET CREATION
    // =============================================
    async function createTicket() {
      if (conversationLog.length < 2) return;

      try {
        const res = await fetch('/api/create-ticket', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversation: conversationLog,
            deviceContext: window.appContext || {},
            area: reportArea || 'Not specified',
          }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        return data;
      } catch (err) {
        console.error('Ticket creation failed:', err);
        return null;
      }
    }

    inputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    inputField.addEventListener('input', () => {
      updateInputButton();
    });

    function updateInputButton() {
      const hasText = inputField.value.trim().length > 0;
      if (hasText) {
        micBtn.style.display = 'none';
        sendBtn.style.display = 'flex';
      } else {
        micBtn.style.display = 'flex';
        sendBtn.style.display = 'none';
      }
    }

    // =============================================
    // VOICE RECORDING (discrete messages)
    // =============================================
    let toniSpeaksMode = false; // once true, Toni auto-plays audio
    let isRecording = false;
    let recordingStream = null;
    let recordingAnalyser = null;
    let recordingAnimFrame = null;
    let recordingStartTime = null;
    let recordingTimerInterval = null;
    let recordingTranscript = '';
    let speechRecognition = null;
    let liveTranscriptBubble = null; // live user bubble during recording
    let micPressStart = 0;
    let micTapMode = false; // true = tap-to-toggle active
    let isStopping = false; // true while waiting for final transcript
    let mediaRecorder = null;
    let recordedChunks = [];
    const MAX_RECORDING_SECS = 60;

    // Initialize waveform bars
    function initWaveformBars() {
      const container = document.getElementById('waveform-bars');
      container.innerHTML = '';
      // Scrolling waveform — bars are added dynamically during recording
      container.style.justifyContent = 'flex-end';
    }

    // Mic button: dual interaction (press-and-hold + tap-to-toggle)
    function setupMicButton() {
      const btn = document.getElementById('mic-btn');
      btn.removeAttribute('onclick');

      let holdMode = false;
      let holdReleased = false; // set true if user releases before recording starts

      // Simple approach: pointerdown/pointerup for unified touch+mouse
      btn.addEventListener('pointerdown', async (e) => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);

        if (isBusy || isStopping) return;

        // If already recording (tap-to-toggle), stop
        if (isRecording) {
          stopRecordingAndSend();
          micTapMode = false;
          return;
        }

        micPressStart = Date.now();
        holdMode = false;
        holdReleased = false;

        // Wait a beat to distinguish tap from hold
        await new Promise(r => setTimeout(r, 250));

        // If already released, this was a tap
        if (holdReleased) return;

        // Still holding — start recording in hold mode
        holdMode = true;
        micTapMode = false;
        await startRecording();

        // If user released while we awaited mic permission, stop now
        if (holdReleased && isRecording) {
          stopRecordingAndSend();
        }
      });

      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        holdReleased = true;
        const pressDuration = Date.now() - micPressStart;

        if (holdMode && isRecording) {
          // Release after hold → send
          stopRecordingAndSend();
          holdMode = false;
        } else if (!holdMode && pressDuration < 250 && !isRecording) {
          // Quick tap → start in tap-to-toggle mode
          micTapMode = true;
          startRecording();
        }
      });

      btn.addEventListener('pointercancel', () => {
        holdReleased = true;
        if (holdMode && isRecording) {
          stopRecordingAndSend();
        }
        holdMode = false;
      });

      // Block click to prevent ghost events
      btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
    }

    async function startRecording() {
      if (isRecording) return;

      try {
        recordingStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true }
        });
      } catch (err) {
        console.error('Mic access denied:', err);
        if (err.name === 'NotAllowedError') {
          addMessage(appLang === 'de'
            ? 'Mikrofonzugriff wurde verweigert. Bitte erlaube den Zugriff in den Einstellungen.'
            : 'Microphone access denied. Please allow access in settings.', 'toni');
        }
        return;
      }

      isRecording = true;
      toniSpeaksMode = true; // Activate Toni speaks mode permanently
      recordingTranscript = '';
      recordingStartTime = Date.now();

      // Set up analyser for waveform
      if (!audioContext) audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(recordingStream);
      recordingAnalyser = audioContext.createAnalyser();
      recordingAnalyser.fftSize = 128;
      recordingAnalyser.smoothingTimeConstant = 0.4;
      source.connect(recordingAnalyser);

      // Show recording UI (swap input field for overlay, keep mic button as stop)
      document.getElementById('input-field').style.display = 'none';
      sendBtn.style.display = 'none';
      const overlay = document.getElementById('recording-overlay');
      overlay.style.display = 'flex';
      initWaveformBars();

      // Swap mic button to stop button
      micBtn.classList.add('recording');
      micBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="12" height="12" rx="2" fill="white"/></svg>`;
      quickReplies.style.display = 'none';
      removeFollowUpChips();

      // Create live transcript bubble
      const liveRow = document.createElement('div');
      liveRow.className = 'msg-row user';
      liveRow.id = 'live-transcript-row';
      const liveBubble = document.createElement('div');
      liveBubble.className = 'msg-bubble';
      liveBubble.style.opacity = '0.6';
      liveBubble.style.fontStyle = 'italic';
      liveBubble.innerHTML = `<span class="listening-dots">${appLang === 'de' ? 'Ich höre zu' : 'Listening'}<span class="dots"></span></span>`;
      liveRow.appendChild(liveBubble);
      messagesArea.appendChild(liveRow);
      messagesArea.scrollTop = messagesArea.scrollHeight;
      liveTranscriptBubble = liveBubble;

      // Start waveform animation
      animateWaveform();

      // Start timer
      updateRecordingTimer();
      recordingTimerInterval = setInterval(updateRecordingTimer, 1000);

      // Start MediaRecorder for server-side transcription fallback
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(recordingStream, {
        mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
      });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.start(250); // collect chunks every 250ms

      // Start speech recognition (optional bonus — works on localhost/HTTPS)
      startSpeechRecognition();

      // Auto-stop after max duration
      setTimeout(() => {
        if (isRecording) stopRecordingAndSend();
      }, MAX_RECORDING_SECS * 1000);
    }

    function animateWaveform() {
      if (!isRecording || !recordingAnalyser) return;

      const container = document.getElementById('waveform-bars');
      const dataArray = new Uint8Array(recordingAnalyser.frequencyBinCount);
      let lastBarTime = 0;
      const BAR_INTERVAL = 80; // ms between new bars

      function update(timestamp) {
        if (!isRecording) return;

        recordingAnalyser.getByteFrequencyData(dataArray);

        // Add a new bar every BAR_INTERVAL ms
        if (timestamp - lastBarTime > BAR_INTERVAL) {
          // Average a few frequency bins for the bar height
          let sum = 0;
          const bins = Math.min(20, dataArray.length);
          for (let i = 0; i < bins; i++) sum += dataArray[i];
          const avg = sum / bins;
          const height = Math.max(3, (avg / 255) * 28);

          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.height = height + 'px';
          container.appendChild(bar);

          // Auto-scroll to show latest bars
          container.scrollLeft = container.scrollWidth;

          lastBarTime = timestamp;
        }

        recordingAnimFrame = requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    function updateRecordingTimer() {
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      const timer = document.getElementById('recording-timer');
      if (timer) timer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function startSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('SpeechRecognition not supported');
        return;
      }

      speechRecognition = new SpeechRecognition();
      speechRecognition.continuous = true;
      speechRecognition.interimResults = true;
      speechRecognition.lang = appLang === 'de' ? 'de-DE' : 'en-US';

      speechRecognition.onstart = () => {
        console.log('[Voice] Speech recognition started');
      };

      speechRecognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        recordingTranscript = transcript;
        // Update live bubble
        if (liveTranscriptBubble && transcript.trim()) {
          liveTranscriptBubble.textContent = transcript;
          liveTranscriptBubble.style.opacity = '1';
          liveTranscriptBubble.style.fontStyle = 'normal';
          messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        console.log('[Voice] Transcript update:', transcript);
      };

      speechRecognition.onerror = (event) => {
        console.warn('[Voice] Speech recognition error:', event.error);
        // Don't stop recording on non-fatal errors
        if (event.error === 'no-speech') return;
      };

      speechRecognition.onend = () => {
        console.log('[Voice] Speech recognition ended, isRecording:', isRecording);
        // Restart if still recording (recognition can stop automatically)
        if (isRecording && speechRecognition) {
          try { speechRecognition.start(); } catch(e) {}
        }
      };

      try { speechRecognition.start(); } catch(e) { console.warn('[Voice] SR start failed:', e); }
    }

    function stopRecordingAndSend() {
      if (!isRecording || isStopping) return;
      isRecording = false;
      isStopping = true;

      // Stop speech recognition
      if (speechRecognition) {
        try { speechRecognition.stop(); } catch(e) {}
      }

      // Stop MediaRecorder
      const mediaRecorderStopped = new Promise(resolve => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.onstop = () => resolve();
          mediaRecorder.stop();
        } else {
          resolve();
        }
      });

      // Hide waveform, show a brief "processing" state
      const overlay = document.getElementById('recording-overlay');
      if (overlay) overlay.style.opacity = '0.5';

      // Wait for MediaRecorder to finish, then try browser transcript first, server fallback second
      mediaRecorderStopped.then(async () => {
        // Give browser SR a moment to finalize
        await new Promise(r => setTimeout(r, 300));

        let transcript = recordingTranscript.trim();

        if (!transcript && recordedChunks.length > 0) {
          // Browser SR failed — use server-side transcription
          console.log('[Voice] Browser SR empty, using server transcription...');
          // Update live bubble to show processing
          if (liveTranscriptBubble) {
            liveTranscriptBubble.textContent = appLang === 'de' ? 'Wird verarbeitet...' : 'Processing...';
          }
          try {
            const audioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            formData.append('lang', appLang);

            const res = await fetch('/api/transcribe', { method: 'POST', body: formData });
            if (res.ok) {
              const data = await res.json();
              transcript = (data.text || '').trim();
              console.log('[Voice] Server transcript:', transcript);
            }
          } catch (err) {
            console.error('[Voice] Server transcription failed:', err);
          }
        }

        // Finalize the live bubble
        const liveBubbleRef = liveTranscriptBubble;
        const liveRowRef = document.getElementById('live-transcript-row');

        isStopping = false;
        cleanupRecording();

        if (transcript) {
          // Update live bubble with final text and make it look like a normal message
          if (liveBubbleRef) {
            liveBubbleRef.textContent = transcript;
            liveBubbleRef.style.opacity = '1';
            liveBubbleRef.style.fontStyle = 'normal';
          }
          // Add timestamp to the live bubble
          if (liveRowRef) {
            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.style.justifyContent = 'flex-end';
            const time = document.createElement('span');
            time.className = 'msg-time';
            time.textContent = getTimeString();
            meta.appendChild(time);
            liveRowRef.appendChild(meta);
            liveRowRef.removeAttribute('id');
          }
          // Track conversation and send to Toni (skip addMessage for user since bubble already exists)
          conversationLog.push({ role: 'user', text: transcript });
          quickReplies.style.display = 'none';
          removeFollowUpChips();
          await sendToToni(transcript);
        } else {
          // Remove the live bubble and show error
          if (liveRowRef) liveRowRef.remove();
          addMessage(appLang === 'de'
            ? 'Ich konnte leider nichts verstehen. Bitte versuche es nochmal.'
            : 'I couldn\'t catch that. Please try again.', 'toni');
        }
      });
    }

    function cancelRecording() {
      // Remove the live transcript bubble
      const liveRow = document.getElementById('live-transcript-row');
      if (liveRow) liveRow.remove();
      cleanupRecording();
    }

    function cleanupRecording() {
      isRecording = false;

      // Stop speech recognition
      if (speechRecognition) {
        try { speechRecognition.stop(); } catch(e) {}
        speechRecognition = null;
      }

      // Stop MediaRecorder
      if (mediaRecorder) {
        if (mediaRecorder.state !== 'inactive') {
          try { mediaRecorder.stop(); } catch(e) {}
        }
        mediaRecorder = null;
      }
      recordedChunks = [];

      // Stop mic stream
      if (recordingStream) {
        recordingStream.getTracks().forEach(t => t.stop());
        recordingStream = null;
      }

      // Stop waveform animation
      if (recordingAnimFrame) {
        cancelAnimationFrame(recordingAnimFrame);
        recordingAnimFrame = null;
      }
      recordingAnalyser = null;

      // Stop timer
      if (recordingTimerInterval) {
        clearInterval(recordingTimerInterval);
        recordingTimerInterval = null;
      }

      // Hide recording UI, show input
      document.getElementById('recording-overlay').style.display = 'none';
      document.getElementById('input-field').style.display = '';
      updateInputButton();

      // Reset overlay opacity
      const overlay = document.getElementById('recording-overlay');
      if (overlay) overlay.style.opacity = '1';

      // Reset mic button back to mic icon
      micBtn.classList.remove('recording');
      micBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>`;
      inputField.disabled = false;
      inputField.placeholder = t('inputPlaceholder');

      // Clear live transcript bubble reference
      liveTranscriptBubble = null;
      micTapMode = false;
    }

    function startMouthSync() {
      const dataArray = new Uint8Array(playbackAnalyser.frequencyBinCount);
      function sync() {
        if (!isPlayingAudio && pcmBuffer.length === 0) {
          setViseme('rest');
          animFrameId = null;
          return;
        }
        playbackAnalyser.getByteFrequencyData(dataArray);
        let sum = 0;
        const start = 1, end = Math.min(30, dataArray.length);
        for (let i = start; i < end; i++) sum += dataArray[i];
        const avg = sum / (end - start);
        let level = avg < 5 ? 0 : avg < 25 ? 1 : avg < 55 ? 2 : avg < 100 ? 3 : 4;
        mouthGroup.innerHTML = volumeMouths[level]();
        animFrameId = requestAnimationFrame(sync);
      }
      sync();
    }

    // =============================================
    // EYE HELPERS
    // =============================================
    function setEyeWhite(id, props) {
      const el = id === 'left' ? leftEyeWhite : rightEyeWhite;
      const d = id === 'left' ? DEFAULT.leftWhite : DEFAULT.rightWhite;
      el.setAttribute('cx', props.cx ?? d.cx);
      el.setAttribute('cy', props.cy ?? d.cy);
      el.setAttribute('rx', props.rx ?? d.rx);
      el.setAttribute('ry', props.ry ?? d.ry);
      el.style.display = props.hidden ? 'none' : '';
    }

    function setEye(id, props) {
      const g = id === 'left' ? leftEye : rightEye;
      const defaults = id === 'left' ? { cx: 940, cy: 1130, r: 95 } : { cx: 1438, cy: 1130, r: 95 };
      g.innerHTML = '';
      g.style.display = props.hidden ? 'none' : '';
      if (props.type === 'normal' || !props.type) {
        const cx = props.cx ?? defaults.cx, cy = props.cy ?? defaults.cy, r = props.r ?? defaults.r;
        g.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${props.fill ?? '#0B0F31'}"/><circle cx="${cx + (props.hlX ?? 30)}" cy="${cy + (props.hlY ?? -35)}" r="${props.hlR ?? 28}" fill="white"/>`;
      } else if (props.type === 'closed-happy') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<path d="M${cx-90} 1150 Q${cx} 1040 ${cx+90} 1150" stroke="#0B0F31" stroke-width="50" stroke-linecap="round" fill="none"/>`;
      } else if (props.type === 'closed-sleepy') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<line x1="${cx-85}" y1="1130" x2="${cx+85}" y2="1130" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/>`;
      } else if (props.type === 'x') {
        const cx = id === 'left' ? 915 : 1413, cy = 1116;
        g.innerHTML = `<line x1="${cx-65}" y1="${cy-65}" x2="${cx+65}" y2="${cy+65}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/><line x1="${cx+65}" y1="${cy-65}" x2="${cx-65}" y2="${cy+65}" stroke="#0B0F31" stroke-width="50" stroke-linecap="round"/>`;
      } else if (props.type === 'heart') {
        const cx = id === 'left' ? 915 : 1413, cy = 1116, s = props.scale ?? 1;
        g.innerHTML = `<path d="M${cx} ${cy+50*s} L${cx-70*s} ${cy-10*s} A${50*s} ${50*s} 0 0 1 ${cx} ${cy-55*s} A${50*s} ${50*s} 0 0 1 ${cx+70*s} ${cy-10*s} Z" fill="#E8345A"/>`;
      } else if (props.type === 'wink') {
        const cx = id === 'left' ? 915 : 1413;
        g.innerHTML = `<path d="M${cx-80} 1130 Q${cx} 1180 ${cx+80} 1130" stroke="#0B0F31" stroke-width="48" stroke-linecap="round" fill="none"/>`;
      }
    }

    function setBrow(id, props) {
      const el = id === 'left' ? leftBrow : rightBrow;
      if (!props || props.hidden) { el.style.display = 'none'; return; }
      el.style.display = '';
      el.setAttribute('d', props.d);
    }

    // =============================================
    // BLINKING
    // =============================================
    const NO_BLINK = ['love', 'sleepy', 'dead', 'cheeky'];

    function scheduleBlink() {
      if (blinkTimeout) clearTimeout(blinkTimeout);
      blinkTimeout = setTimeout(() => {
        if (NO_BLINK.includes(currentExpression)) { scheduleBlink(); return; }
        doBlink();
      }, 2200 + Math.random() * 2000);
    }

    function doBlink() {
      // Debug panel eyes
      const savedL = leftEye.innerHTML, savedR = rightEye.innerHTML;
      const savedLRy = leftEyeWhite.getAttribute('ry'), savedRRy = rightEyeWhite.getAttribute('ry');
      const savedLCy = leftEyeWhite.getAttribute('cy'), savedRCy = rightEyeWhite.getAttribute('cy');
      leftEyeWhite.setAttribute('ry', '30'); rightEyeWhite.setAttribute('ry', '30');
      leftEyeWhite.setAttribute('cy', '1140'); rightEyeWhite.setAttribute('cy', '1140');
      leftEye.innerHTML = ''; rightEye.innerHTML = '';

      // Header avatar eyes
      const hLW = document.getElementById('h-left-eye-white');
      const hRW = document.getElementById('h-right-eye-white');
      const hLE = document.getElementById('h-left-eye');
      const hRE = document.getElementById('h-right-eye');
      let hSavedL, hSavedR, hSavedLRy, hSavedRRy;
      if (hLW && hLE) {
        hSavedL = hLE.innerHTML; hSavedR = hRE.innerHTML;
        hSavedLRy = hLW.getAttribute('ry'); hSavedRRy = hRW.getAttribute('ry');
        hLW.setAttribute('ry', '20'); hRW.setAttribute('ry', '20');
        hLE.innerHTML = ''; hRE.innerHTML = '';
      }

      setTimeout(() => {
        leftEyeWhite.setAttribute('ry', savedLRy); rightEyeWhite.setAttribute('ry', savedRRy);
        leftEyeWhite.setAttribute('cy', savedLCy); rightEyeWhite.setAttribute('cy', savedRCy);
        leftEye.innerHTML = savedL; rightEye.innerHTML = savedR;

        if (hLW && hLE) {
          hLW.setAttribute('ry', hSavedLRy); hRW.setAttribute('ry', hSavedRRy);
          hLE.innerHTML = hSavedL; hRE.innerHTML = hSavedR;
        }
        scheduleBlink();
      }, 120);
    }

    // =============================================
    // EXPRESSIONS
    // =============================================
    function resetFace() {
      setEyeWhite('left', {});
      setEyeWhite('right', {});
      setEye('left', { type: 'normal' });
      setEye('right', { type: 'normal' });
      setBrow('left', { hidden: true });
      setBrow('right', { hidden: true });
      setViseme('rest');
      document.querySelectorAll('.expression-chips button').forEach(b => b.classList.remove('active'));
    }

    function setExpression(expr) {
      resetFace();
      currentExpression = expr;
      const btn = document.getElementById('btn-' + expr);
      if (btn) btn.classList.add('active');

      switch (expr) {
        case 'happy': setViseme('rest'); break;
        case 'excited':
          setEye('left', { type: 'closed-happy' }); setEye('right', { type: 'closed-happy' });
          setEyeWhite('left', { hidden: true }); setEyeWhite('right', { hidden: true });
          mouthGroup.innerHTML = visemes.AEI(); break;
        case 'surprised':
          setEyeWhite('left', { ry: 280 }); setEyeWhite('right', { ry: 280 });
          setEye('left', { type: 'normal', r: 80, cy: 1120, hlR: 24 }); setEye('right', { type: 'normal', r: 80, cy: 1120, hlR: 24 });
          setBrow('left', { d: 'M810 815 Q915 770 1020 815' }); setBrow('right', { d: 'M1308 815 Q1413 770 1518 815' });
          setViseme('O'); break;
        case 'sad':
          setEyeWhite('left', { ry: 220, cy: 1130 }); setEyeWhite('right', { ry: 220, cy: 1130 });
          setEye('left', { type: 'normal', cy: 1150, r: 85, hlY: -28 }); setEye('right', { type: 'normal', cy: 1150, r: 85, hlY: -28 });
          setBrow('left', { d: 'M810 855 Q910 810 1020 870' }); setBrow('right', { d: 'M1308 870 Q1418 810 1518 855' });
          mouthGroup.innerHTML = `<path d="M${MX-180} ${MY+40} Q${MX} ${MY-50} ${MX+180} ${MY+40}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`; break;
        case 'angry':
          setEyeWhite('left', { ry: 200, cy: 1130 }); setEyeWhite('right', { ry: 200, cy: 1130 });
          setEye('left', { type: 'normal', cy: 1140, r: 90 }); setEye('right', { type: 'normal', cy: 1140, r: 90 });
          setBrow('left', { d: 'M790 830 L1040 895' }); setBrow('right', { d: 'M1288 895 L1538 830' });
          setViseme('BMP'); break;
        case 'love':
          setEye('left', { type: 'heart', scale: 1.2 }); setEye('right', { type: 'heart', scale: 1.2 });
          mouthGroup.innerHTML = `<path d="M${MX-200} ${MY} Q${MX} ${MY+110} ${MX+200} ${MY}" stroke="#0B0F31" stroke-width="46" stroke-linecap="round" fill="none"/>`; break;
        case 'sleepy':
          setEye('left', { type: 'closed-sleepy' }); setEye('right', { type: 'closed-sleepy' });
          setEyeWhite('left', { ry: 160, cy: 1130 }); setEyeWhite('right', { ry: 160, cy: 1130 });
          mouthGroup.innerHTML = `<path d="M${MX-80} ${MY} Q${MX} ${MY+40} ${MX+80} ${MY}" stroke="#0B0F31" stroke-width="40" stroke-linecap="round" fill="none"/>`; break;
        case 'skeptical':
          setEyeWhite('right', { ry: 170, cy: 1140 });
          setEye('left', { type: 'normal', cx: 950, cy: 1130 }); setEye('right', { type: 'normal', cx: 1445, cy: 1145, r: 80 });
          setBrow('left', { d: 'M810 800 Q915 770 1020 800' });
          mouthGroup.innerHTML = `<path d="M${MX-170} ${MY+10} Q${MX-50} ${MY+50} ${MX+170} ${MY-20}" stroke="#0B0F31" stroke-width="44" stroke-linecap="round" fill="none"/>`; break;
        case 'cheeky':
          setEye('left', { type: 'normal', cx: 935, cy: 1120 }); setEye('right', { type: 'wink' });
          setEyeWhite('right', { ry: 170, cy: 1130 });
          mouthGroup.innerHTML = visemes.AEI(); break;
        case 'dead':
          setEye('left', { type: 'x' }); setEye('right', { type: 'x' });
          setEyeWhite('left', { hidden: true }); setEyeWhite('right', { hidden: true });
          mouthGroup.innerHTML = `<path d="M${MX-170} ${MY} Q${MX-80} ${MY-30} ${MX} ${MY+10} Q${MX+80} ${MY+40} ${MX+170} ${MY-10}" stroke="#0B0F31" stroke-width="44" stroke-linecap="round" fill="none"/>`; break;
        case 'lookaway':
          setEye('left', { type: 'normal', cx: 870, cy: 1110, hlX: 25, hlY: -30 }); setEye('right', { type: 'normal', cx: 1370, cy: 1110, hlX: 25, hlY: -30 });
          mouthGroup.innerHTML = `<path d="M${MX-100} ${MY} Q${MX} ${MY+40} ${MX+100} ${MY}" stroke="#0B0F31" stroke-width="42" stroke-linecap="round" fill="none"/>`; break;
      }
      scheduleBlink();
    }

    // =============================================
    // DEBUG PANEL
    // =============================================
    function toggleDebugPanel() {
      document.getElementById('debug-panel').classList.toggle('open');
    }

    // =============================================
    // INIT
    // =============================================
    setExpression('happy');
    scheduleBlink();

    // Set up mic/send button swap and mic interactions
    updateInputButton();
    setupMicButton();
    document.getElementById('recording-cancel').addEventListener('click', (e) => {
      e.stopPropagation();
      cancelRecording();
    });

    // Detect language from browser if no native context
    const browserLang = (navigator.language || 'de').slice(0, 2).toLowerCase();
    if (browserLang === 'en') appLang = 'en';
    applyLanguage();

    // Welcome message from Toni (with typing animation + audio)
    const WELCOME_TEXT = t('welcome');
    addMessage(WELCOME_TEXT, 'toni', null, { typewriter: true, typewriterSpeed: 20 });

    // Fetch audio for welcome message in the background, then attach it
    fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: WELCOME_TEXT }),
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data?.audio) {
        const firstMsg = messagesArea.querySelector('.msg-row.toni');
        if (firstMsg) {
          const playBtn = firstMsg.querySelector('.play-audio-btn');
          if (playBtn) {
            // Already has a button (shouldn't happen), update audio
            playBtn._audioBase64 = data.audio;
          } else {
            // Add meta with audio to the first message
            let meta = firstMsg.querySelector('.msg-meta');
            if (!meta) {
              meta = document.createElement('div');
              meta.className = 'msg-meta';
              firstMsg.appendChild(meta);
            }
            const btn = document.createElement('button');
            btn.className = 'play-audio-btn';
            btn.innerHTML = `
              <svg class="progress-ring" viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" stroke-dasharray="94.25" stroke-dashoffset="0"/></svg>
              <svg class="icon icon-volume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
              <svg class="icon icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              <svg class="icon icon-play" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>`;
            btn._audioBase64 = data.audio;
            btn.onclick = () => togglePlayAudio(btn);
            meta.prepend(btn);
          }
        }
      }
    })
    .catch(() => {}); // silently fail — audio is optional

    // DEBUG: simulate app context in browser (remove before shipping)
    if (!window.webkit?.messageHandlers?.toni) {
      setTimeout(() => {
        window.setAppContext({
          platform: 'Browser (debug)',
          device: navigator.userAgent.split('(')[1]?.split(')')[0] || 'Unknown',
          app: '–',
          environment: 'debug',
          userId: '–',
          userType: '–',
          organization: '–',
          locale: navigator.language,
          language: navigator.language.split('-')[0],
          entrypoint: 'browser',
        });
      }, 100);
    }
  </script>
